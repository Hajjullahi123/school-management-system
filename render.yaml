services:
  - type: web
    name: school-management-system
    env: node
    plan: free
    buildCommand: bash render-build.sh
    startCommand: bash start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: school-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://your-app-name.onrender.com

databases:
  - name: school-db
    databaseName: schooldb
    user: schooladmin
    plan: free
