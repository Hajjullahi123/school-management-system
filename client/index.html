<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description"
    content="School Management System - Comprehensive platform for managing students, teachers, fees, attendance, and academic records" />
  <meta name="theme-color" content="#4F46E5" />
  <title>EduTechAI School Manager</title>
  <script type="module" src="/error-logger.js"></script>
</head>

<body>
  <div id="root">
    <div style="font-family: sans-serif; text-align: center; margin-top: 50px;">
      <h1>Loading School Management System...</h1>
      <p>If this message doesn't disappear in a few seconds, there is a problem.</p>
    </div>
  </div>
  <script>
    // Handle dynamic import failures (common after new deployments)
    window.addEventListener('error', function (e) {
      if (e.message && e.message.includes('Failed to fetch dynamically imported module')) {
        console.warn('Dynamic import failed. Potential new deployment. Refreshing...');
        window.location.reload();
        return;
      }

      // Ignore image/resource load errors
      if (e.target && (e.target.tagName === 'IMG' || e.target.tagName === 'LINK')) {
        return;
      }

      // Show critical JavaScript errors
      if (e.target && e.target.tagName === 'SCRIPT') {
        var msg = 'Critical Script Failed to Load: ' + (e.target.src || 'Unknown source') + '. Please refresh your browser.';
        console.error(msg);
        
        // Use DOM methods instead of innerHTML += to avoid destroying the existing app state
        var errorDiv = document.createElement('div');
        errorDiv.id = 'critical-script-error';
        errorDiv.style.cssText = 'color:white; background:red; padding:20px; border:2px solid black; margin:20px; z-index:9999; position:fixed; bottom:0; left:0; right:0; font-family:sans-serif; pointer-events:none; shadow: 0 0 20px rgba(0,0,0,0.5);';
        errorDiv.innerHTML = '<strong style="display:block;margin-bottom:5px;">SYSTEM ALERT</strong>' + msg;
        document.body.appendChild(errorDiv);
      }
    }, true);

    // Also catch unhandled promise rejections (where dynamic imports often fail)
    window.addEventListener('unhandledrejection', function (event) {
      if (event.reason && (
        event.reason.message && event.reason.message.includes('Failed to fetch dynamically imported module') ||
        event.reason.name === 'ChunkLoadError' ||
        event.reason.toString().includes('Loading chunk')
      )) {
        console.warn('Chunk load failed. Refreshing to get latest version...');
        window.location.reload();
      }
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
